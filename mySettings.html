<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="x5-orientation" content="portrait">
    <meta name="x5-fullscreen" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>设置 - Zeus</title>
    <style>
        :root {
            --primary: #F19871;
            --primary-dark: #E8865A;
            --primary-ghost: #FFF8F5;
            --text: #2D2D2D;
            --text-secondary: #8E8E93;
            --text-muted: #C7C7CC;
            --border: #F0F0F2;
            --bg: #F9F9FB;
            --white: #fff;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(180deg, #FFF8F5 0%, #FFFFFF 25%);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .page {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 0 0 60px;
            animation: pageIn 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ======== Header ======== */
        .header {
            padding: 20px 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-back {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .header-back:active { background: rgba(0,0,0,0.04); }
        .header-back svg {
            width: 22px; height: 22px;
            stroke: var(--text); fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .header-title {
            font-size: 19px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        /* ======== Avatar Section ======== */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0 8px;
        }
        .avatar-circle {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #F19871, #F5B89E);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: 600; color: #fff;
            box-shadow: 0 4px 16px rgba(241,152,113,0.3);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .avatar-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }
        .avatar-dept {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ======== Cards ======== */
        .section {
            margin: 20px 20px 0;
        }
        .section-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
            padding-left: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            height: 56px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .card-row:last-child { border-bottom: none; }
        .card-row:active { background: var(--bg); }

        .card-row-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .card-icon {
            width: 20px; height: 20px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .card-icon svg {
            width: 20px; height: 20px;
            stroke: var(--text-secondary); fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        .card-label {
            font-size: 15px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .card-value {
            font-size: 15px;
            color: var(--text);
            font-weight: 500;
            margin-left: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .card-action {
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
            flex-shrink: 0;
            cursor: pointer;
            padding: 6px 0;
            transition: opacity 0.2s;
        }
        .card-action:active { opacity: 0.6; }

        .card-arrow {
            width: 16px; height: 16px;
            flex-shrink: 0; margin-left: 6px;
            stroke: var(--primary); fill: none;
            stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }

        /* ======== Logout ======== */
        .logout-section {
            margin: 36px 20px 0;
        }
        .btn-logout {
            display: block;
            width: 100%;
            height: 50px;
            line-height: 50px;
            text-align: center;
            background: var(--white);
            color: #FF4D4F;
            font-size: 16px;
            font-weight: 500;
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid rgba(255,77,79,0.2);
            font-family: inherit;
            letter-spacing: 1px;
            box-shadow: var(--card-shadow);
            transition: all 0.25s;
        }
        .btn-logout:active {
            background: #FFF5F5;
            border-color: rgba(255,77,79,0.4);
        }

        /* ======== Toast ======== */
        .toast-layer {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            display: flex; justify-content: center; pointer-events: none;
        }
        .toast-msg {
            margin-top: 55px; padding: 14px 30px;
            background: rgba(45,45,45,0.9);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            color: #fff; font-size: 15px; letter-spacing: 0.5px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
            transform: translateY(-120px); opacity: 0;
        }
        .toast-msg.show { transform: translateY(0); opacity: 1; }

        /* ======== Dialog ======== */
        .dialog-mask {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            z-index: 8888;
            display: none;
            align-items: center; justify-content: center;
            animation: fadeIn 0.25s;
        }
        .dialog-mask.show { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .dialog-box {
            width: calc(100% - 64px);
            max-width: 380px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            animation: dialogIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes dialogIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .dialog-title {
            text-align: center;
            padding: 28px 24px 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }
        .dialog-body {
            padding: 16px 24px 8px;
        }
        .dialog-field {
            margin-bottom: 14px;
        }
        .dialog-input {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text);
            background: var(--bg);
            outline: none;
            font-family: inherit;
            caret-color: var(--primary);
            transition: border-color 0.25s;
        }
        .dialog-input:focus {
            border-color: var(--primary);
            background: var(--primary-ghost);
            box-shadow: 0 0 0 3px rgba(241,152,113,0.1);
        }
        .dialog-error {
            font-size: 12px; color: #FF4D4F;
            padding: 4px 4px 0; display: none;
        }
        .dialog-error.show { display: block; }

        .sms-field-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sms-field-row .dialog-input {
            flex: 1;
        }
        .sms-code-btn {
            flex-shrink: 0;
            height: 46px;
            padding: 0 16px;
            border: 1.5px solid var(--primary);
            border-radius: 12px;
            background: transparent;
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .sms-code-btn:active { background: var(--primary-ghost); transform: scale(0.96); }
        .sms-code-btn.counting {
            border-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .sms-code-btn.counting:active { background: transparent; transform: none; }

        .dialog-actions {
            display: flex;
            border-top: 1px solid var(--border);
        }
        .dialog-btn {
            flex: 1; height: 50px; line-height: 50px;
            text-align: center; font-size: 16px; font-weight: 500;
            cursor: pointer; border: none; background: none;
            font-family: inherit; letter-spacing: 0.5px;
            transition: background 0.15s;
        }
        .dialog-btn:active { background: var(--bg); }
        .dialog-btn.cancel { color: var(--text-secondary); }
        .dialog-btn.confirm { color: var(--primary); font-weight: 600; }
        .dialog-btn + .dialog-btn { border-left: 1px solid var(--border); }

        /* ======== Responsive ======== */
        @media (min-width: 480px) {
            body { background: #F0F0F5; }
            .page {
                margin: 20px auto;
                min-height: auto;
                background: linear-gradient(180deg, #FFF8F5 0%, #FFFFFF 25%);
                border-radius: 24px;
                box-shadow: 0 8px 30px rgba(0,0,0,0.08);
                overflow: hidden;
            }
        }
    </style>
</head>
<body>

    <div class="toast-layer"><div class="toast-msg" id="toast"></div></div>

    <div class="dialog-mask" id="dialogMask">
        <div class="dialog-box" id="dialogBox"></div>
    </div>

    <div class="page">
        <!-- Header -->
        <div class="header">
            <div class="header-back" id="btnBack">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
            <span class="header-title">设置</span>
        </div>

        <!-- Avatar -->
        <div class="avatar-section">
            <div class="avatar-circle" id="avatarText">周</div>
            <div class="avatar-name" id="displayName">周林科</div>
            <div class="avatar-dept">融查查科技</div>
        </div>

        <!-- Account Info -->
        <div class="section">
            <div class="section-label">账号信息</div>
            <div class="card">
                <div class="card-row" id="rowNickname">
                    <div class="card-row-left">
                        <span class="card-icon">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20v-1a7 7 0 0 1 14 0v1"/></svg>
                        </span>
                        <span class="card-label">姓名</span>
                        <span class="card-value" id="nicknameValue">周林科</span>
                    </div>
                    <span class="card-action" id="btnEditNickname">
                        修改<svg class="card-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </span>
                </div>
                <div class="card-row" id="rowPhone">
                    <div class="card-row-left">
                        <span class="card-icon">
                            <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                        </span>
                        <span class="card-label">手机号</span>
                        <span class="card-value" id="phoneValue">13650020342</span>
                    </div>
                    <span class="card-action" id="btnEditPhone">
                        修改<svg class="card-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </span>
                </div>
                <div class="card-row" id="rowPassword">
                    <div class="card-row-left">
                        <span class="card-icon">
                            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </span>
                        <span class="card-label">登录密码</span>
                        <span class="card-value">******</span>
                    </div>
                    <span class="card-action" id="btnEditPassword">
                        修改<svg class="card-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </span>
                </div>
            </div>
        </div>

        <!-- Logout -->
        <div class="logout-section">
            <button class="btn-logout" id="btnLogout">退出登录</button>
        </div>
    </div>

    <script>
    (function() {
        var toastEl = document.getElementById('toast'), toastTimer;
        function showToast(msg) {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2000);
        }

        // Back button
        document.getElementById('btnBack').addEventListener('click', function() {
            showToast('返回上一页');
        });

        // Dialog helpers
        function showDialog(title, bodyHTML, onConfirm) {
            var content = '';
            content += '<div class="dialog-title">' + title + '</div>';
            content += '<div class="dialog-body">' + bodyHTML + '</div>';
            content += '<div class="dialog-actions">';
            content += '<button class="dialog-btn cancel" id="dialogCancel">取消</button>';
            content += '<button class="dialog-btn confirm" id="dialogConfirm">确定</button>';
            content += '</div>';
            document.getElementById('dialogBox').innerHTML = content;
            document.getElementById('dialogMask').classList.add('show');

            document.getElementById('dialogCancel').onclick = function() {
                closeDialog();
            };
            document.getElementById('dialogConfirm').onclick = function() {
                if (onConfirm) {
                    var keep = onConfirm();
                    if (keep === false) return; // validation failed, keep dialog open
                }
                closeDialog();
            };
        }

        function closeDialog() {
            document.getElementById('dialogMask').classList.remove('show');
            // Clear phone timers if any
            if (typeof phoneTimer1 !== 'undefined' && phoneCount1 > 0) { clearInterval(phoneTimer1); phoneCount1 = 0; }
            if (typeof phoneTimer2 !== 'undefined' && phoneCount2 > 0) { clearInterval(phoneTimer2); phoneCount2 = 0; }
        }

        document.getElementById('dialogMask').addEventListener('click', function(e) {
            if (e.target === this) closeDialog();
        });

        // ======== Edit Nickname ========
        document.getElementById('btnEditNickname').addEventListener('click', function() {
            var currentName = document.getElementById('nicknameValue').textContent.trim();
            var body = '<div class="dialog-field">' +
                '<input class="dialog-input" id="dialogNickname" placeholder="请输入姓名" value="' + currentName + '" maxlength="20">' +
                '<div class="dialog-error" id="dialogNickError">姓名不能为空</div>' +
                '</div>';

            showDialog('修改姓名', body, function() {
                var newName = document.getElementById('dialogNickname').value.trim();
                if (!newName || newName.length < 2) {
                    document.getElementById('dialogNickError').classList.add('show');
                    return false;
                }
                document.getElementById('nicknameValue').textContent = newName;
                document.getElementById('displayName').textContent = newName;
                document.getElementById('avatarText').textContent = newName.charAt(0);
                showToast('姓名修改成功');
            });
        });

        // ======== Edit Phone ========
        var phoneTimer1, phoneCount1 = 0;
        var phoneTimer2, phoneCount2 = 0;

        document.getElementById('btnEditPhone').addEventListener('click', function() {
            var currentPhone = document.getElementById('phoneValue').textContent.trim();
            phoneCount1 = 0; phoneCount2 = 0;

            var body = '' +
                '<div class="dialog-field" style="text-align:center;color:var(--text-secondary);font-size:14px;padding-bottom:8px;">当前手机号：' + currentPhone + '</div>' +
                '<div class="dialog-field">' +
                '<div class="sms-field-row">' +
                '<input class="dialog-input" id="dialogOldSms" placeholder="原手机验证码" maxlength="6">' +
                '<button class="sms-code-btn" id="dialogOldSmsBtn" type="button">获取验证码</button>' +
                '</div>' +
                '<div class="dialog-error" id="dialogOldSmsError">请输入原手机验证码</div>' +
                '</div>' +
                '<div style="height:1px;background:var(--border);margin:8px 0 14px;"></div>' +
                '<div class="dialog-field">' +
                '<input class="dialog-input" id="dialogNewPhone" placeholder="请输入新手机号" maxlength="11">' +
                '<div class="dialog-error" id="dialogPhoneError">请输入正确的11位手机号</div>' +
                '</div>' +
                '<div class="dialog-field">' +
                '<div class="sms-field-row">' +
                '<input class="dialog-input" id="dialogNewSms" placeholder="新手机验证码" maxlength="6">' +
                '<button class="sms-code-btn" id="dialogNewSmsBtn" type="button">获取验证码</button>' +
                '</div>' +
                '<div class="dialog-error" id="dialogNewSmsError">请输入新手机验证码</div>' +
                '</div>';

            showDialog('修改手机号', body, function() {
                var oldSms = document.getElementById('dialogOldSms').value.replace(/\D/g, '');
                var newPhone = document.getElementById('dialogNewPhone').value.replace(/\D/g, '');
                var newSms = document.getElementById('dialogNewSms').value.replace(/\D/g, '');
                var ok = true;

                if (!/^\d{4,6}$/.test(oldSms)) {
                    document.getElementById('dialogOldSmsError').classList.add('show'); ok = false;
                }
                if (!/^1[3-9]\d{9}$/.test(newPhone)) {
                    document.getElementById('dialogPhoneError').classList.add('show'); ok = false;
                }
                if (!/^\d{4,6}$/.test(newSms)) {
                    document.getElementById('dialogNewSmsError').classList.add('show'); ok = false;
                }
                if (!ok) return false;
                if (phoneCount1 > 0) { clearInterval(phoneTimer1); }
                if (phoneCount2 > 0) { clearInterval(phoneTimer2); }

                document.getElementById('phoneValue').textContent = newPhone;
                showToast('手机号修改成功');
            });

            // Bind after render
            setTimeout(function() {
                var oldSmsBtn = document.getElementById('dialogOldSmsBtn');
                var newSmsBtn = document.getElementById('dialogNewSmsBtn');
                var newPhoneInput = document.getElementById('dialogNewPhone');

                // Auto-strip non-digits
                newPhoneInput.addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });
                document.getElementById('dialogOldSms').addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });
                document.getElementById('dialogNewSms').addEventListener('input', function() { this.value = this.value.replace(/\D/g, ''); });

                // Old phone SMS - send to current number
                oldSmsBtn.addEventListener('click', function(e) {
                    e.preventDefault(); e.stopPropagation();
                    if (phoneCount1 > 0) return;
                    phoneCount1 = 60; oldSmsBtn.textContent = '60s';
                    oldSmsBtn.classList.add('counting'); oldSmsBtn.disabled = true;
                    phoneTimer1 = setInterval(function() {
                        phoneCount1--;
                        if (phoneCount1 <= 0) { clearInterval(phoneTimer1); oldSmsBtn.textContent = '获取验证码'; oldSmsBtn.classList.remove('counting'); oldSmsBtn.disabled = false; }
                        else { oldSmsBtn.textContent = phoneCount1 + 's'; }
                    }, 1000);
                    showToast('验证码已发送至 ' + currentPhone);
                });

                // New phone SMS
                newSmsBtn.addEventListener('click', function(e) {
                    e.preventDefault(); e.stopPropagation();
                    if (phoneCount2 > 0) return;
                    var p = newPhoneInput.value.replace(/\D/g, '');
                    if (!/^1[3-9]\d{9}$/.test(p)) {
                        document.getElementById('dialogPhoneError').classList.add('show');
                        return;
                    }
                    document.getElementById('dialogPhoneError').classList.remove('show');
                    phoneCount2 = 60; newSmsBtn.textContent = '60s';
                    newSmsBtn.classList.add('counting'); newSmsBtn.disabled = true;
                    phoneTimer2 = setInterval(function() {
                        phoneCount2--;
                        if (phoneCount2 <= 0) { clearInterval(phoneTimer2); newSmsBtn.textContent = '获取验证码'; newSmsBtn.classList.remove('counting'); newSmsBtn.disabled = false; }
                        else { newSmsBtn.textContent = phoneCount2 + 's'; }
                    }, 1000);
                    showToast('验证码已发送至 ' + p);
                });
            }, 50);
        });

        // ======== Edit Password ========
        document.getElementById('btnEditPassword').addEventListener('click', function() {
            var body = '' +
                '<div class="dialog-field">' +
                '<input class="dialog-input" id="dialogOldPwd" type="password" placeholder="请输入原密码" maxlength="20">' +
                '<div class="dialog-error" id="dialogOldPwdError">请输入原密码</div>' +
                '</div>' +
                '<div class="dialog-field">' +
                '<input class="dialog-input" id="dialogNewPwd" type="password" placeholder="请输入新密码（6-20位）" maxlength="20">' +
                '<div class="dialog-error" id="dialogNewPwdError">密码长度需为6-20位</div>' +
                '</div>' +
                '<div class="dialog-field">' +
                '<input class="dialog-input" id="dialogConfirmPwd" type="password" placeholder="请再次输入新密码" maxlength="20">' +
                '<div class="dialog-error" id="dialogConfirmPwdError">两次输入的密码不一致</div>' +
                '</div>';

            showDialog('修改密码', body, function() {
                var oldPwd = document.getElementById('dialogOldPwd').value;
                var newPwd = document.getElementById('dialogNewPwd').value;
                var confirmPwd = document.getElementById('dialogConfirmPwd').value;
                var ok = true;

                if (!oldPwd) { document.getElementById('dialogOldPwdError').classList.add('show'); ok = false; }
                if (newPwd.length < 6 || newPwd.length > 20) { document.getElementById('dialogNewPwdError').classList.add('show'); ok = false; }
                if (newPwd !== confirmPwd) { document.getElementById('dialogConfirmPwdError').classList.add('show'); ok = false; }
                if (!ok) return false;
                showToast('密码修改成功');
            });
        });

        // ======== Logout ========
        document.getElementById('btnLogout').addEventListener('click', function() {
            showDialog('退出登录', '<p style="text-align:center;color:var(--text-secondary);font-size:15px;padding:8px 0;">确定要退出当前账号吗？</p>', function() {
                showToast('已退出登录');
            });
        });

        console.log('Zeus 设置页 已就绪');
    })();
    </script>
</body>
</html>
