<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的 - Zeus</title>
    <style>
        :root {
            --primary: #F19871;
            --primary-dark: #E8865A;
            --text: #1D1D1F;
            --text-secondary: #86868B;
            --border: #F2F2F5;
            --bg: #F5F5F7;
            --white: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; min-height: 100vh; background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }
        .page {
            width: 100%; max-width: 480px; margin: 0 auto;
            min-height: 100vh; padding-bottom: 88px;
            animation: pageIn 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        @keyframes pageIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ======== Header ======== */
        .profile-header {
            background: linear-gradient(160deg, #F19871, #E8865A, #DC7545);
            padding: 30px 20px 28px;
        }
        .company-name {
            font-size: 26px; font-weight: 800; color: #fff;
            margin-bottom: 20px; letter-spacing: 1px;
            display: none;
        }
        .header-row {
            display: flex; align-items: flex-start; gap: 14px;
        }
        .avatar {
            width: 60px; height: 60px; border-radius: 16px;
            background: rgba(255,255,255,0.22);
            border: 2px solid rgba(255,255,255,0.35);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; overflow: hidden;
            font-size: 26px; font-weight: 700; color: #fff;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-info { flex: 1; padding-top: 4px; }
        .user-name { font-size: 18px; font-weight: 600; color: #fff; }
        .user-phone { font-size: 14px; color: rgba(255,255,255,0.65); margin-top: 4px; }
        .user-dept { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 2px; }

        .notify-btn {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(255,255,255,0.18);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; cursor: pointer; position: relative;
            margin-top: 2px;
        }
        .notify-btn:active { background: rgba(255,255,255,0.3); }
        .notify-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .badge {
            position: absolute; top: -3px; right: -3px;
            min-width: 18px; height: 18px; line-height: 18px; text-align: center;
            padding: 0 5px; border-radius: 9px;
            background: #FF3B30; color: #fff; font-size: 10px; font-weight: 700;
            border: 1.5px solid #DC7545;
        }

        .tags-row {
            display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
            margin-top: 16px;
        }
        .tag {
            padding: 4px 12px; border-radius: 20px;
            background: rgba(255,255,255,0.15);
            font-size: 12px; color: #fff; font-weight: 500; white-space: nowrap;
        }
        .tag-dept {
            background: rgba(255,255,255,0.22);
            font-weight: 600;
        }

        .stats-row {
            display: flex;
            margin-top: 20px; padding-top: 18px;
            border-top: 1px solid rgba(255,255,255,0.12);
        }
        .stat { flex: 1; text-align: center; }
        .stat-num { font-size: 20px; font-weight: 700; color: #fff; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

        /* ======== Menu ======== */
        .menu-section { padding: 0 12px; margin-top: 14px; }
        .menu-card {
            background: var(--white); border-radius: 16px; overflow: hidden;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
        }
        .menu-group + .menu-group { border-top: 8px solid var(--bg); }

        .menu-item {
            display: flex; align-items: center; padding: 18px 20px;
            cursor: pointer; transition: background 0.12s;
        }
        .menu-item:active { background: #F9F9FB; }
        .menu-item + .menu-item { border-top: 0.5px solid var(--border); }

        .menu-icon {
            width: 22px; height: 22px; flex-shrink: 0; margin-right: 14px;
            stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;
        }
        .menu-label { flex: 1; font-size: 16px; color: var(--text); }
        .menu-sub { font-size: 12px; color: #C7C7CC; margin-right: 6px; }
        .menu-badge {
            font-size: 11px; color: #fff; background: #FF3B30;
            border-radius: 10px; min-width: 20px; height: 20px; line-height: 20px;
            text-align: center; padding: 0 6px; font-weight: 600; margin-right: 4px;
        }
        .menu-arrow { width: 16px; height: 16px; flex-shrink: 0; stroke: #D1D1D6; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* ======== Tab Bar ======== */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; border-top: 0.5px solid var(--border);
            padding: 4px 0 env(safe-area-inset-bottom, 8px); z-index: 100;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 2px; cursor: pointer; padding: 6px 0 2px;
        }
        .tab-item svg {
            width: 24px; height: 24px; stroke: #8E8E93; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        .tab-item.active svg { stroke: var(--primary); }
        .tab-label { font-size: 10px; color: #8E8E93; }
        .tab-item.active .tab-label { color: var(--primary); }

        /* ======== Toast ======== */
        .toast-layer {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            display: flex; justify-content: center; pointer-events: none;
        }
        .toast-msg {
            margin-top: 55px; padding: 14px 30px;
            background: rgba(29,29,31,0.88); backdrop-filter: blur(12px);
            color: #fff; font-size: 14px; border-radius: 24px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
            transform: translateY(-120px); opacity: 0;
        }
        .toast-msg.show { transform: translateY(0); opacity: 1; }

        @media (min-width: 480px) {
            body { background: #ECECF0; }
            .page { margin: 20px auto; min-height: auto; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); overflow: hidden; }
            .tab-bar { border-radius: 0 0 24px 24px; }
        }
    </style>
</head>
<body>

    <div class="toast-layer"><div class="toast-msg" id="toast"></div></div>

    <div class="page">
        <!-- Header -->
        <div class="profile-header">
            <div class="company-name" id="companyName"></div>
            <div class="header-row">

                    <div class="user-name" id="userName">周林科</div>
                    <div class="user-phone">136 **** 0342</div>
                    <div class="user-dept" id="userDept" style="display:none"></div>
                </div>
                <div class="notify-btn" id="btnNotify">

                    <span class="badge">3</span>

            <div class="tags-row" id="tagsRow"></div>
            <div class="stats-row">
                <div class="stat"><div class="stat-num">¥0</div><div class="stat-label">累计佣金</div></div>
                <div class="stat"><div class="stat-num">0</div><div class="stat-label">邀约客户</div></div>
                <div class="stat"><div class="stat-num">0</div><div class="stat-label">团队成员</div></div>

        </div>

        <!-- Menu -->
        <div class="menu-section">
            <div class="menu-card">
                <div class="menu-group">
                    <div class="menu-item" data-page="commission">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#F19871"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <span class="menu-label">我的佣金</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="menu-item" data-page="invite">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#4A90D9"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                        <span class="menu-label">我的邀约</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="menu-item" data-page="team">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#7C6FF7"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <span class="menu-label">我的团队</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="menu-item" data-page="friend">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#F5A623"><circle cx="12" cy="7" r="4"/><path d="M5.5 21v-2a4 4 0 0 1 3.5-3.87"/><path d="M18.5 21v-2a4 4 0 0 0-3.5-3.87"/><line x1="17" y1="3" x2="22" y2="3"/><line x1="19.5" y1="0.5" x2="19.5" y2="5.5"/></svg>
                        <span class="menu-label">邀请好友</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                </div>
                <div class="menu-group">
                    <div class="menu-item" data-page="about">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#8E8E93"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        <span class="menu-label">关于我们</span>
                        <span class="menu-sub">v1.2.0</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="menu-item" data-page="settings">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#F19871"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span class="menu-label">设置</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="menu-item" data-page="contact">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#34C759"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        <span class="menu-label">联系我们</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                    <div class="menu-item" data-page="message">
                        <svg class="menu-icon" viewBox="0 0 24 24" stroke="#FF3B30"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span class="menu-label">系统消息</span>
                        <span class="menu-badge">3</span>
                        <svg class="menu-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Bar -->
        <nav class="tab-bar">
            <div class="tab-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="tab-label">首页</span></div>
            <div class="tab-item"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-3-3.87"/><circle cx="12" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="18" cy="7" r="4"/></svg><span class="tab-label">客户管理</span></div>
            <div class="tab-item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span class="tab-label">拓客空间</span></div>
            <div class="tab-item"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span class="tab-label">产品管理</span></div>
            <div class="tab-item active"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="tab-label">我的</span></div>
        </nav>
    </div>

    <script>
    (function() {
        // ======== 用户数据 ========
        // --- SaaS 用户（当前）---
        var user = { name:'周林科', phone:'136 **** 0342', company:'融查查科技', logo:'https://zeus-h5-test.irongchacha.cn/static/img/rcckjlogo.896b174e.png', department:'业务部', roles:['业务经理','按揭专员','财务人员','按揭总监','方案审批员','管理员'] };

        // --- 自然流量用户 ---
        // var user = { name:'周林科', phone:'136 **** 0342', company:'', logo:'', department:'', roles:['业务经理'] };

        // ======== 自适应渲染 ========
        // 头像/Logo
        if (user.logo) {
            document.getElementById('avatarEl').innerHTML = '<img src="'+user.logo+'" alt="logo">';
        }

        // 公司名（最顶部大字）
        if (user.company) {
            var cn = document.getElementById('companyName');
            cn.style.display = 'block';
            cn.textContent = user.company;
        }

        // 部门
        if (user.department) {
            var deptEl = document.getElementById('userDept');
            deptEl.style.display = 'block';
            deptEl.textContent = user.department;
        }

        // 标签行：仅角色
        var tagsHTML = '';
        user.roles.forEach(function(r) {
            tagsHTML += '<span class="tag">' + r + '</span>';
        });
        document.getElementById('tagsRow').innerHTML = tagsHTML;

        // ======== Events ========
        var toastEl = document.getElementById('toast'), toastTimer;
        function showToast(msg) {
            clearTimeout(toastTimer); toastEl.textContent = msg;
            toastEl.classList.add('show');
            toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2000);
        }
        document.getElementById('btnNotify').onclick = function() { showToast('系统消息'); };
        document.querySelectorAll('.menu-item').forEach(function(item) {
            item.onclick = function() {
                var l = this.querySelector('.menu-label').textContent;
                showToast(l === '设置' ? '前往设置' : l);
            };
        });
        document.querySelectorAll('.tab-item').forEach(function(t) {
            t.onclick = function() {
                document.querySelectorAll('.tab-item').forEach(function(x) { x.classList.remove('active'); });
                this.classList.add('active');
            };
        });
        console.log('Zeus 我的 已就绪');
    })();
    </script>
</body>
</html>
